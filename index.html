<script>
// Screens
function startExperience(){
    document.getElementById("bgMusic").play();
    nextScreen(2);
}

function nextScreen(num) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("screen"+num).classList.add("active");
}

// Typing animation for message
const messageText = `Rita, today you officially step into 18 — 
a powerful, beautiful, and exciting new chapter of life.
I’m genuinely grateful for your love.
You carry strength, kindness, and intelligence in such a natural way.
May this year open doors you never imagined,
bring peace in your decisions,
confidence in your dreams,
and joy in every moment.
Keep shining. Keep growing.
18 looks incredible on you. ✨🥂
– Roy 💫`;

let i = 0;
function typeMessage(){
    if(i < messageText.length){
        document.getElementById("message").innerHTML += messageText.charAt(i);
        i++;
        setTimeout(typeMessage,40);
    }
}
window.onload = () => {
    if(document.getElementById("screen2").classList.contains("active")){
        typeMessage();
    }
}

// Hidden secret message
function showSecret(){
    document.getElementById("secretBtn").style.display = "inline-block";
}

// Fireworks effect
function celebrate(){
    for(let i=0;i<150;i++){
        let fw = document.createElement("div");
        fw.className="firework";
        fw.style.left = Math.random()*100+"vw";
        fw.style.top = Math.random()*50+"vh";
        fw.style.background = `hsl(${Math.random()*360},70%,70%)`;
        document.body.appendChild(fw);

        let angle = Math.random()*360;
        let distance = 100 + Math.random()*100;
        fw.animate([
            {transform:`translate(0,0)`, opacity:1},
            {transform:`translate(${distance*Math.cos(angle*Math.PI/180)}px,${distance*Math.sin(angle*Math.PI/180)}px)`, opacity:0}
        ],{
            duration: 1500 + Math.random()*1500,
            easing: 'ease-out'
        });
        setTimeout(()=>{fw.remove()},3000);
    }
    createBalloons();
}

// Balloons
function createBalloons(){
    for(let i=0;i<21;i++){
        let b=document.createElement("div");
        b.className="balloon";
        b.style.left=Math.random()*100+"vw";
        b.style.background=`hsl(${Math.random()*360},70%,70%)`;
        document.body.appendChild(b);
    }
}
</script>
